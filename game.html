<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Save Ashy</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    image-rendering: pixelated;
}

/* GAME */
#game {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
}

/* WORLD */
#world {
    position: absolute;
    top: 0;
    left: 0;
    will-change: transform;
}

/* MAP */
#map {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
}

/* ENTITIES */
.entity {
    position: absolute;
    width: 120px;
    height: 120px;
    will-change: transform;
}

/* SPRITES */
.entity img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
}

/* 🌊 PLAYER FLOAT + 🟣 PURPLE AURA */
#playerSprite {
    animation: float 2.8s ease-in-out infinite;
    transform-origin: center;

    filter:
        drop-shadow(0 0 6px rgba(180, 0, 255, 0.9))
        drop-shadow(0 0 14px rgba(120, 0, 255, 0.6))
        drop-shadow(0 0 28px rgba(90, 0, 255, 0.4));
}

/* 🌑 shadow */
#player::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 8px;
    transform: translateX(-50%);
    width: 60px;
    height: 14px;
    background: rgba(0,0,0,0.45);
    border-radius: 50%;
    filter: blur(3px);
    animation: shadowFloat 2.8s ease-in-out infinite;
}

/* 🌬️ NPC breathing */
.npc-breathe {
    animation: breathe 2.6s ease-in-out infinite;
    transform-origin: center bottom;
}

/* FLOAT */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

/* SHADOW */
@keyframes shadowFloat {
    0% { transform: translateX(-50%) scale(1); opacity: 0.4; }
    50% { transform: translateX(-50%) scale(0.75); opacity: 0.25; }
    100% { transform: translateX(-50%) scale(1); opacity: 0.4; }
}

/* BREATH */
@keyframes breathe {
    0% { transform: scale(1) translateY(0px); }
    50% { transform: scale(1.04) translateY(-2px); }
    100% { transform: scale(1) translateY(0px); }
}

/* DIALOG */
#dialogue-box {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.88);
    color: white;
    padding: 16px 20px;
    border: 2px solid white;
    font-family: Arial;
    font-size: 16px;
    display: none;
    max-width: 75%;
    min-width: 340px;
    text-align: left;
    z-index: 100;
    border-radius: 6px;
}

@media (max-width: 768px), (pointer: coarse) {
    #dialogue-box {
        bottom: 220px;
        min-width: 280px;
        max-width: 85%;
        font-size: 14px;
    }
}

#dialogue-name {
    font-weight: bold;
    color: #ffaaff;
    margin-bottom: 6px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#dialogue-text {
    line-height: 1.5;
    min-height: 40px;
    white-space: pre-wrap;
    word-spacing: normal;
    letter-spacing: normal;
    font-family: Arial, sans-serif;
}

#dialogue-choices {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.choice-btn {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.5);
    padding: 8px 14px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    border-radius: 4px;
    transition: background 0.15s, border-color 0.15s;
    letter-spacing: normal;
    word-spacing: normal;
}

.choice-btn:hover {

    border-color: white;
}

#dialogue-hint {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    text-align: center;
}
/* MOBILE CONTROLS */
#mobile-controls {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 200px;
    pointer-events: none;
    z-index: 200;
}

#joystick-zone {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 130px;
    height: 130px;
    pointer-events: all;
}

#joystick-base {
    position: absolute;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    border: 3px solid rgba(255,255,255,0.5);
}

#joystick-knob {
    position: absolute;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    border: 3px solid rgba(255,255,255,0.5);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

#talk-btn {

/* TRANSITION OVERLAY */
#transition-overlay {
    position: fixed;
    inset: 0;
    background: black;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
    transition: opacity 1.2s ease;
}

#transition-overlay.fade-in {
    opacity: 1;
    pointer-events: all;
}

/* GIFT OPEN BUTTON */
#gift-open-btn {

    margin-top: 14px;

#gift-open-btn:hover {

}

#gift-open-btn.visible {

/* VIDEO OVERLAY */
/* VIDEO OVERLAY */
#video-overlay {

    60%  { transform: scale(1.07) rotate(2deg); opacity: 1; }
    75%  { transform: scale(0.97) rotate(-1deg); }
    88%  { transform: scale(1.03) rotate(0.5deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }

/* REWARD TITLE */
#reward-title {

    font-size: 13px;
    font-weight: bold;

/* PARTICLES CANVAS */

/* MOBILE JOYSTICK */
const joystickZone = document.getElementById("joystick-zone");
const joystickKnob = document.getElementById("joystick-knob");
const talkBtn = document.getElementById("talk-btn");

const joystickRadius = 38;
let joystickActive = false;
let joystickOrigin = { x: 0, y: 0 };
let joystickDelta = { x: 0, y: 0 };

function getJoystickPos(e) {
    const touch = e.touches ? e.touches[0] : e;
    const rect = joystickZone.getBoundingClientRect();
    return {
        x: touch.clientX - rect.left - 65,
        y: touch.clientY - rect.top - 65
    };
}

joystickZone.addEventListener("touchstart", e => {
    e.preventDefault();
    joystickActive = true;
    const pos = getJoystickPos(e);
    joystickDelta = pos;
    updateKnob();
}, { passive: false });

joystickZone.addEventListener("touchmove", e => {
    e.preventDefault();
    if (!joystickActive) return;
    const pos = getJoystickPos(e);
    const dist = Math.sqrt(pos.x * pos.x + pos.y * pos.y);
    if (dist > joystickRadius) {
        joystickDelta.x = (pos.x / dist) * joystickRadius;
        joystickDelta.y = (pos.y / dist) * joystickRadius;
    } else {
        joystickDelta = pos;
    }
    updateKnob();
}, { passive: false });

joystickZone.addEventListener("touchend", e => {
    e.preventDefault();
    joystickActive = false;
    joystickDelta = { x: 0, y: 0 };
    updateKnob();
}, { passive: false });

function updateKnob() {
    joystickKnob.style.transform =
        `translate(calc(-50% + ${joystickDelta.x}px), calc(-50% + ${joystickDelta.y}px))`;
}

// Talk button fires space key
talkBtn.addEventListener("touchstart", e => {
    e.preventDefault();
    keys[" "] = true;
}, { passive: false });

talkBtn.addEventListener("touchend", e => {
    e.preventDefault();
    keys[" "] = false;

/* DIALOGUE SYSTEM */
const dialogueBox = document.getElementById("dialogue-box");
const dialogueName = document.getElementById("dialogue-name");
const dialogueText = document.getElementById("dialogue-text");
const dialogueChoices = document.getElementById("dialogue-choices");
const dialogueHint = document.getElementById("dialogue-hint");

let dialogueState = "idle"; // idle, typing, waiting, choices, done
let typeInterval = null;
let dialogueLocked = false;
let spaceWasDown = false;

function clearChoices() {
    dialogueChoices.innerHTML = "";
}

function typeText(text, onDone) {
    dialogueText.innerText = "";
    dialogueState = "typing";
    dialogueLocked = true;
    let i = 0;
    clearInterval(typeInterval);
    typeInterval = setInterval(() => {
        dialogueText.innerText += text[i];
        i++;
        if (i >= text.length) {
            clearInterval(typeInterval);
            dialogueState = "waiting";
            if (onDone) onDone();
        }
    }, 30);
}

function showDialogue(name, text, choices, showGift) {
    dialogueBox.style.display = "block";
    dialogueName.innerText = name;
    clearChoices();
    dialogueHint.style.display = "none";
    document.getElementById("gift-open-btn").classList.remove("visible");

    typeText(text, () => {
        if (choices && choices.length > 0) {
            showChoices(choices);
        } else if (showGift) {
            // show received message then gift button
            const receivedLine = document.createElement("div");
            receivedLine.style.cssText = "margin-top:10px;font-size:13px;color:rgba(255,255,255,0.6);text-align:center;";
            receivedLine.textContent = "✨ (You Received Something from Ais!) ✨";
            dialogueChoices.appendChild(receivedLine);
            setTimeout(() => {
                document.getElementById("gift-open-btn").classList.add("visible");
            }, 600);
            dialogueState = "choices";
            dialogueLocked = false;
        } else {
            dialogueHint.innerText = "[SPACE] to close";
            dialogueHint.style.display = "block";
            dialogueState = "done";
            dialogueLocked = false;
        }
    });
}

function showChoices(choices) {
    clearChoices();
    choices.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerText = c.label;
        btn.addEventListener("click", () => {
            clearChoices();
            c.onChoose();
        });
        dialogueChoices.appendChild(btn);
    });
    dialogueState = "choices";
    dialogueLocked = false;
}

function closeDialogue() {

    dialogueState = "idle";
    dialogueLocked = false;
    clearChoices();
    clearInterval(typeInterval);
    document.getElementById("gift-open-btn").classList.remove("visible");
}

/* GOLD PARTICLE BURST */
function burstParticles() {
    const canvas = document.getElementById("reward-particles");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const colors = ["#f5d060", "#c8a84b", "#fff8dc", "#e8b84b", "#fffacd", "#d4af37"];

    const particles = Array.from({ length: 80 }, () => {
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 10;
        const size = 3 + Math.random() * 5;
        const shape = Math.random() < 0.5 ? "circle" : "rect";
        return {
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - (Math.random() * 4),
            size,
            color: colors[Math.floor(Math.random() * colors.length)],
            alpha: 1,
            shape,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.2
        };
    });

    let frame;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.3; // gravity
            p.alpha -= 0.018;
            p.rotation += p.rotSpeed;
            if (p.alpha <= 0) return;
            alive = true;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.alpha);
            ctx.fillStyle = p.color;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            if (p.shape === "circle") {
                ctx.beginPath();
                ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
            }
            ctx.restore();
        });
        if (alive) frame = requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    cancelAnimationFrame(frame);
    draw();
}

const playerHitbox = {
    x: 30,
    y: 30,
    width: 60,
    height: 80
};

/* CAMERA */
let camX = 0;
let camY = 0;

/* COLLISION */
function collide(a, b) {
    return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );
}

/* INIT */
map.onload = () => {
    mapW = map.naturalWidth || 2000;
    mapH = map.naturalHeight || 2000;

    px = mapW / 2;
    py = mapH / 2;

    kx = px - 120;
    ky = py;

    npc.x = mapW / 2;
    npc.y = 100;
};

/* PLAYER SPRITE */
function updatePlayerSprite() {
    if (dir === "up") playerSprite.src = "pics/ashyback.png";
    if (dir === "down") playerSprite.src = "pics/ashyfront.png";
    if (dir === "left") playerSprite.src = "pics/ashyleft.png";
    if (dir === "right") playerSprite.src = "pics/ashyright.png";
}

/* LOOP */
function loop() {

    let nextX = px;
    let nextY = py;

    // Joystick threshold
    const joyThresh = 8;

    if (keys["w"] || keys["arrowup"] || joystickDelta.y < -joyThresh) { nextY -= speed; dir = "up"; lastDir = "up"; }
    if (keys["s"] || keys["arrowdown"] || joystickDelta.y > joyThresh) { nextY += speed; dir = "down"; lastDir = "down"; }
    if (keys["a"] || keys["arrowleft"] || joystickDelta.x < -joyThresh) { nextX -= speed; dir = "left"; lastDir = "left"; }
    if (keys["d"] || keys["arrowright"] || joystickDelta.x > joyThresh) { nextX += speed; dir = "right"; lastDir = "right"; }

    const pBox = {
        x: nextX + playerHitbox.x,
        y: nextY + playerHitbox.y,
        width: playerHitbox.width,
        height: playerHitbox.height
    };

    const nBox = {
        x: npc.x + npc.hitbox.x,
        y: npc.y + npc.hitbox.y,
        width: npc.hitbox.width,
        height: npc.hitbox.height
    };

    // 🚫 NPC SOLID ONLY CENTER HITBOX
    if (!collide(pBox, nBox)) {
        px = nextX;
        py = nextY;
    }

    updatePlayerSprite();

    /* KUROMI */
    let dx = px - kx;
    let dy = py - ky;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 0) {
        dx /= dist;
        dy /= dist;
    }

    if (dist > 100) {
        kx += dx * followSpeed;
        ky += dy * followSpeed;
    }

    kuromiSprite.src = `pics/kuromi${lastDir}${frame}.png`;

    tick++;
    if (tick % 8 === 0) frame = (frame + 1) % 4;

    /* NPC */
    npcEl.style.transform =
        `translate3d(${npc.x}px, ${npc.y}px, 0)`;

    /* INTERACTION */
    let npcDist = Math.hypot(px - npc.x, py - npc.y);
    const spaceDown = keys[" "];

    if (npcDist < 120) {
        if (dialogueState === "idle") {
            dialogueHint.innerText = "[SPACE] to talk";
            dialogueHint.style.display = "block";
            dialogueBox.style.display = "block";
            dialogueName.innerText = "";
            dialogueText.innerText = "";
        }

        // Trigger dialogue on fresh space press
        if (spaceDown && !spaceWasDown) {
            if (dialogueState === "idle") {
                startAisDialogue();
            } else if (dialogueState === "done") {
                closeDialogue();
            }
        }
    } else {
        if (dialogueState === "idle") {
            dialogueBox.style.display = "none";
        }
        if (dialogueState === "done") {
            closeDialogue();
        }
    }

    spaceWasDown = spaceDown;

    /* RENDER */
    player.style.transform =
        `translate3d(${px}px, ${py}px, 0)`;

    kuromi.style.transform =
        `translate3d(${kx}px, ${ky}px, 0)`;

    /* CAMERA */
    const sw = window.innerWidth;
    const sh = window.innerHeight;

    let targetX = sw / 2 - px;
    let targetY = sh / 2 - py;

    if (mapW > sw) targetX = Math.min(0, Math.max(sw - mapW, targetX));
    if (mapH > sh) targetY = Math.min(0, Math.max(sh - mapH, targetY));

    camX += (targetX - camX) * 0.12;
    camY += (targetY - camY) * 0.12;

    world.style.transform =
        `translate3d(${camX | 0}px, ${camY | 0}px, 0)`;

    requestAnimationFrame(loop);
}

loop();

</script>
